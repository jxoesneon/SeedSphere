name: Deploy to Fly.io (dev)

on:
  push:
    branches: [ 'dev', 'dev-*' ]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server/**'
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.cjs'
      - 'fly.toml'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      strategy:
        description: "Fly deploy strategy"
        required: false
        default: immediate
        type: choice
        options: [immediate, bluegreen, rolling]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: seedsphere-dev
      FLY_ORG_NAME: joseeduardox-gmail-com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists (idempotent)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
          FLY_ORG_SLUG: ${{ env.FLY_ORG_NAME }}
        run: |
          set -euo pipefail
          if ! flyctl apps show "${APP_NAME}" >/dev/null 2>&1; then
            if [ -n "${FLY_ORG_SLUG:-}" ]; then
              echo "Creating app ${APP_NAME} in org ${FLY_ORG_SLUG}"
              flyctl apps create "${APP_NAME}" --org "${FLY_ORG_SLUG}"
            else
              echo "Creating app ${APP_NAME} in default org"
              flyctl apps create "${APP_NAME}"
            fi
          else
            echo "App ${APP_NAME} already exists."
          fi

      - name: Stage Fly secrets (if provided)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: |
          set -euo pipefail
          set_if_present() {
            key="$1"; val="$2";
            if [ -n "${val}" ]; then
              flyctl secrets set "${key}=${val}" --stage --app "${APP_NAME}"
            fi
          }
          set_if_present AUTH_JWT_SECRET "${{ secrets.AUTH_JWT_SECRET }}"
          set_if_present SMTP_HOST "${{ secrets.SMTP_HOST }}"
          set_if_present SMTP_PORT "${{ secrets.SMTP_PORT }}"
          set_if_present SMTP_USER "${{ secrets.SMTP_USER }}"
          set_if_present SMTP_PASS "${{ secrets.SMTP_PASS }}"
          set_if_present SMTP_SECURE "${{ secrets.SMTP_SECURE }}"
          set_if_present SMTP_FROM "${{ secrets.SMTP_FROM }}"
          set_if_present BREVO_API_KEY "${{ secrets.BREVO_API_KEY }}"
          set_if_present GOOGLE_CLIENT_ID "${{ secrets.GOOGLE_CLIENT_ID }}"
          set_if_present GOOGLE_CLIENT_SECRET "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          flyctl secrets set APP_ENV=dev --stage --app "${APP_NAME}"

      - name: Deploy app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: |
          set -euo pipefail
          STRATEGY="${{ github.event.inputs.strategy || 'immediate' }}"
          echo "Deploying with strategy: ${STRATEGY}"
          flyctl deploy --remote-only --strategy "${STRATEGY}" --app "${APP_NAME}"

# Notes:
# - This workflow targets the staging app `seedsphere-dev` and requires `FLY_API_TOKEN_DEV`.
# - Ensure fly.toml and Dockerfile remain in sync with the dev environment expectations.
